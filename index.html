<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecciona tu Aventura</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            color: white;
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid #ffffff;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 90%;
        }
        
        .title {
            font-size: 32px;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 3px 3px 0 #ff6b6b;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }
        
        .subtitle {
            font-size: 16px;
            margin-bottom: 40px;
            color: #cccccc;
            line-height: 1.8;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 30px;
        }
        
        .option-button {
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 3px solid #ffffff;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .option-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        
        .option-button:active {
            transform: translateY(0);
        }
        
        .option-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .option-button:hover::before {
            left: 100%;
        }
        
        .flowey-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        
        .description {
            font-size: 12px;
            color: #aaaaaa;
            margin-top: 10px;
            line-height: 1.6;
        }
        
        .coming-soon {
            opacity: 0.6;
            background: linear-gradient(135deg, #666666 0%, #333333 100%);
            cursor: not-allowed;
            position: relative;
        }
        
        .coming-soon::after {
            content: "PRÓXIMAMENTE";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff4757;
            color: white;
            padding: 5px 10px;
            font-size: 8px;
            border-radius: 3px;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes titleGlow {
            0% { text-shadow: 3px 3px 0 #ff6b6b, 0 0 20px #ffd700; }
            100% { text-shadow: 3px 3px 0 #ff6b6b, 0 0 30px #ffd700, 0 0 40px #ffd700; }
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 14px;
            }
            
            .option-button {
                font-size: 12px;
                padding: 15px 20px;
            }
            
            .container {
                padding: 30px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 18px;
            }
            
            .subtitle {
                font-size: 12px;
            }
            
            .option-button {
                font-size: 10px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cabiver.github.io/Regalo/flowey1.png" alt="Flowey" class="flowey-icon">
        
        <h1 class="title">¡BIENVENIDO!</h1>
        <p class="subtitle">
            Elige tu aventura en el mundo de UNDERTALE<br>
            Cada historia es única y especial
        </p>
        
        <div class="options">
            <a href="undertale-flowey.html" class="option-button">
                💖 Aniversario
                <div class="description">
                    Una aventura romántica con Flowey<br>
                    Perfecta para celebrar momentos especiales
                </div>
            </a>
            
            <a href="amor-amistad.html" class="option-button">
                🌻 AMOR Y AMISTAD
                <div class="description">
                    Mensajes especiales de personajes kawaii<br>
                    de recuerdos!
                </div>
            </a>
            
            <a href="#" class="option-button coming-soon">
                💀 navidad
                <div class="description">
                    que sera???<br>
                    Coming soon...
                </div>
            </a>
        </div>
    </div>
    
    <script>
        // Prevenir navegación en botones "coming soon"
        document.querySelectorAll('.coming-soon').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Efecto visual de "no disponible"
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
                
                // Opcional: mostrar mensaje
                console.log('Esta función estará disponible pronto!');
            });
        });
        
        // Efecto de sonido hover (opcional)
        document.querySelectorAll('.option-button:not(.coming-soon)').forEach(button => {
            button.addEventListener('mouseenter', function() {
                // Aquí podrías agregar un sonido de hover si tienes uno
            });
        });
    </script>
</body>
</html>
