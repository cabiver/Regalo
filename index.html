<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Molly ✦</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Dancing+Script:wght@400;700&family=Crimson+Text:ital@1&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep:#0d0020;
  --purple:#7b2fff;
  --purple-l:#bf80ff;
  --purple-p:#e8ccff;
  --gold:#ffd84f;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg-deep);
  min-height:100vh;
  overflow-x:hidden;
  font-family:'Crimson Text',serif;
}

canvas.bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:0;
}

.page{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:36px 16px 60px;
}

.header{text-align:center;margin-bottom:20px}
.header h1{
  font-family:'Cinzel';
  font-size:2.2rem;
  color:var(--purple-l);
}
.header p{
  font-family:'Dancing Script';
  color:var(--gold);
}

.dedication-fixed{
  font-family:'Dancing Script';
  font-size:1.5rem;
  color:var(--purple-p);
  margin-bottom:20px;
}

.stage{
  position:relative;
  width:min(700px,96vw);
  height:480px;
}

.bg-character{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  opacity:0.9;
  z-index:0;
  pointer-events:none;
  filter:drop-shadow(0 0 20px rgba(123,47,255,0.6));
}

.children-row{
  position:absolute;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:40px;
  z-index:2;
}

/* velas */
.candle-wrap svg{
  filter:drop-shadow(0 0 10px rgba(255,50,50,0.6));
}

.controls{
  margin-top:20px;
}

.btn-magic{
  padding:12px 30px;
  border-radius:30px;
  border:none;
  background:var(--purple);
  color:white;
  cursor:pointer;
}

#status-msg{
  margin-top:10px;
  color:var(--gold);
  font-family:'Dancing Script';
}

</style>
</head>

<body>

<canvas class="bg" id="starsC"></canvas>

<div class="page">

<div class="header">
<h1>✦ Flores Mágicas ✦</h1>
<p>Un regalo encantado</p>
</div>

<div class="dedication-fixed">— Para Molly, con todo el amor del mundo —</div>

<div class="stage" id="stage">

<!-- IMAGEN DETRÁS -->
<img src="TU_IMAGEN_AQUI.png" class="bg-character"/>

<!-- VELAS -->
<div class="children-row">

<div class="candle-wrap">
<svg width="22" height="52">
<rect x="6" y="26" width="10" height="24" rx="3" fill="#cc1111"/>
<ellipse cx="11" cy="13" rx="5" ry="8" fill="#ff3333"/>
</svg>
</div>

<div class="candle-wrap">
<svg width="22" height="52">
<rect x="6" y="26" width="10" height="24" rx="3" fill="#cc1111"/>
<ellipse cx="11" cy="13" rx="5" ry="8" fill="#ff3333"/>
</svg>
</div>

<div class="candle-wrap">
<svg width="22" height="52">
<rect x="6" y="26" width="10" height="24" rx="3" fill="#cc1111"/>
<ellipse cx="11" cy="13" rx="5" ry="8" fill="#ff3333"/>
</svg>
</div>

</div>

</div>

<div id="status-msg">✨ Presiona el botón para iniciar la magia...</div>

<div class="controls">
<button class="btn-magic" onclick="startMagic()">✨ Magia</button>
</div>

</div>

<script>

/* estrellas */
const c=document.getElementById("starsC");
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
window.onresize=resize;
resize();

let stars=[];
for(let i=0;i<150;i++){
stars.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
stars.forEach(s=>{
ctx.fillStyle="white";
ctx.fillRect(s.x,s.y,2,2);
});
requestAnimationFrame(draw);
}
draw();

/* magia simple */
function startMagic(){
document.getElementById("status-msg").textContent="💜 La magia aparece...";
}

</script>

</body>
</html>
